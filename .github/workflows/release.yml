name: Release Agent

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go mod tidy
          go build -trimpath -ldflags="-s -w" -o "proxypool-agent-${GOOS}-${GOARCH}" ./cmd/agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxypool-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: proxypool-agent-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Rename binaries
        run: |
          mv dist/proxypool-agent-linux-amd64 proxypool-agent-linux-amd64 || true
          mv dist/proxypool-agent-linux-arm64 proxypool-agent-linux-arm64 || true
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/proxypool-agent-linux-*
